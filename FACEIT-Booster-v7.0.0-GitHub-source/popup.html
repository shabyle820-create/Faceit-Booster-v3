<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FACEIT Booster</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<main>
  <header>
    <div class="brand"><img src="logo.png" alt="FACEIT Booster logo"></div>
    <div><h1>FACEIT Booster</h1><p>Inline matchroom enhancer</p></div>
  </header>

  <section class="card">
    <label class="toggle"><span><b>Extension enabled</b><small>Master switch</small></span><input id="enabled" type="checkbox"><i></i></label>
    <label class="toggle"><span><b>Analyze automatically</b><small>Loads data when a matchroom opens</small></span><input id="autoAnalyze" type="checkbox"><i></i></label>
  </section>

  <section class="card">
    <h2>Matchroom data</h2>
    <label class="toggle"><span><b>Team and player Elo</b><small>Individual and average Elo</small></span><input id="showTeamElo" type="checkbox"><i></i></label>
    <label class="toggle"><span><b>Country flags</b><small>Real country flag image</small></span><input id="showFlags" type="checkbox"><i></i></label>
    <label class="toggle"><span><b>Performance</b><small>Matches, win rate, K/D and form</small></span><input id="showPerformance" type="checkbox"><i></i></label>
    <label class="toggle"><span><b>Smurf percentage</b><small>Shows Smurf: 0–100%</small></span><input id="showSmurfRisk" type="checkbox"><i></i></label>
    <label class="toggle"><span><b>Elo estimate</b><small>Estimated gain/loss</small></span><input id="showEloEstimate" type="checkbox"><i></i></label>

    <label class="toggle">
      <span>
        <b>Highlight team leaders</b>
        <small>Your leader green, opponent leader red</small>
      </span>
      <input id="highlightTeamLeaders" type="checkbox"><i></i>
    </label>
    <label class="toggle"><span><b>Compact panel</b><small>Smaller lobby display</small></span><input id="compactMode" type="checkbox"><i></i></label>
  </section>

  <section class="card">
    <h2>Player settings</h2>
    <label class="field"><span>Nickname</span><input id="nickname" placeholder="Exact FACEIT name"></label>
    <div class="buttons single"><button id="analyze">Enhance room</button></div>
    <p class="note">Every change saves automatically.</p>
    <div id="status"></div>
  </section>

  <section class="card">
    <h2>Automation</h2>
    <label class="toggle"><span><b>Auto ready-up</b><small>Off by default</small></span><input id="autoReady" type="checkbox"><i></i></label>
    <label class="field"><span>Ready delay</span><select id="readyDelay"><option value="0">Immediately</option><option value="1">1 second</option><option value="3">3 seconds</option><option value="5">5 seconds</option><option value="10">10 seconds</option></select></label>
    <label class="toggle"><span><b>Auto party accept</b><small>Accept visible invitations</small></span><input id="autoParty" type="checkbox"><i></i></label>
    <label class="field"><span>Party delay</span><select id="partyDelay"><option value="0">Immediately</option><option value="1">1 second</option><option value="3">3 seconds</option><option value="5">5 seconds</option><option value="10">10 seconds</option></select></label>
  </section>


  <section class="card fb-credit-card">
    <div class="fb-credit-title">--BANII--S</div>
    <button id="discordCredit" class="fb-discord-btn" type="button" title="Copy Discord username and open Discord">
      <svg class="fb-discord-icon" viewBox="0 0 127.14 96.36" aria-hidden="true">
        <path fill="currentColor" d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0 105.89 105.89 0 0 0 19.39 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-9.84 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 9.83A105.25 105.25 0 0 0 126.6 80.22c2.64-27.39-4.51-51.11-18.9-72.15ZM42.45 65.69C32.5 65.69 24.34 56.5 24.34 45.2s8-20.5 18.11-20.5 18.28 9.27 18.11 20.5c0 11.3-8 20.49-18.11 20.49Zm42.24 0c-10 0-18.11-9.19-18.11-20.49S74.58 24.7 84.69 24.7 103 34 102.8 45.2c0 11.3-8 20.49-18.11 20.49Z"/>
      </svg>
      <span>Discord</span>
      <strong>shabyyy2</strong>
    </button>
    <div id="discordStatus" class="fb-discord-status"></div>
  </section>

</main>
<script src="popup.js"></script>
</body>
</html>
