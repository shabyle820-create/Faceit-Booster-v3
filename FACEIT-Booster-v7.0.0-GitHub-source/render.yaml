services:
  - type: web
    name: faceit-booster-api
    runtime: node
    rootDir: FACEIT-Booster-v7.0.0-GitHub-source/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FACEIT_API_KEY
        sync: false
      - key: CHROME_EXTENSION_IDS
        sync: false
